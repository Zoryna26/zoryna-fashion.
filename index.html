<!DOCTYPE html>
<html class="dark" lang="bg">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Zoryna Fashion - Начало</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#f2ca50",
                      "background": "#131313",
                      "on-background": "#e2e2e2",
                      "surface-container": "#1f1f1f",
                      "primary-container": "#d4af37"
              },
              "fontFamily": {
                      "headline": ["Noto Serif"],
                      "body": ["Manrope"]
              }
            },
          },
        }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; }
        .serif-display { font-family: 'Noto Serif', serif; }
        /* Скрипт за отваряне на менюто */
        #mobile-menu.active { transform: translateX(0); }
    </style>
</head>
<body class="bg-background text-on-background">

<header class="fixed top-0 z-50 w-full bg-[#131313] flex flex-col items-center px-8 py-4 shadow-lg">
    <div class="flex items-center justify-between w-full max-w-7xl">
        <div class="flex items-center gap-6">
            <button onclick="toggleMenu()" class="text-[#d4af37] hover:opacity-80 transition-all">
                <span class="material-symbols-outlined text-3xl">menu</span>
            </button>
            <div class="hidden md:flex gap-8">
                <a class="text-[#f2ca50] font-serif text-lg border-b border-[#d4af37]" href="index.html">Начало</a>
                <a class="text-[#e2e2e2] hover:text-[#f2ca50] transition-all font-serif text-lg" href="gallery.html">Галерия</a>
                <a class="text-[#e2e2e2] hover:text-[#f2ca50] transition-all font-serif text-lg" href="about.html">За нас</a>
            </div>
        </div>
        <div class="text-2xl md:text-3xl font-serif tracking-widest text-[#d4af37] uppercase font-bold">Zoryna Fashion</div>
        <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-[#d4af37]">shopping_bag</span>
        </div>
    </div>
</header>

<aside id="mobile-menu" class="fixed left-0 top-0 h-full w-72 bg-[#1c1c1c] z-[60] flex flex-col p-8 gap-6 -translate-x-full transition-transform duration-300 shadow-2xl pt-24">
    <button onclick="toggleMenu()" class="absolute top-6 right-6 text-[#d4af37]">
        <span class="material-symbols-outlined">close</span>
    </button>
    <nav class="flex flex-col gap-6">
        <a class="text-[#f2ca50] text-xl font-serif" href="index.html">Начало</a>
        <a class="text-[#e2e2e2] text-xl font-serif" href="gallery.html">Галерия с модели</a>
        <a class="text-[#e2e2e2] text-xl font-serif" href="about.html">За нас</a>
        <hr class="border-[#d4af37]/20">
        <p class="text-[10px] uppercase tracking-widest text-[#d4af37]">Категории</p>
        <a class="text-[#e2e2e2] opacity-80 hover:opacity-100" href="#">Тениски</a>
        <a class="text-[#e2e2e2] opacity-80 hover:opacity-100" href="#">Суитшърти</a>
        <a class="text-[#e2e2e2] opacity-80 hover:opacity-100" href="contact.html">Контакти</a>
    </nav>
