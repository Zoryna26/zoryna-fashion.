<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoryna Fashion</title>
    <style>
        /* ТУК Е ДИЗАЙНЪТ (CSS) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background-color: #000; color: #fff; }
        
        .header { background: #000; border-bottom: 2px solid #D4AF37; position: sticky; top: 0; z-index: 100; padding: 15px; }
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        
        .logo { color: #D4AF37; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .burger-btn { background: none; border: none; color: #D4AF37; font-size: 30px; cursor: pointer; }
        
        .search-bar { display: flex; padding: 10px; background: #1a1a1a; margin-top: 10px; border-radius: 5px; }
        .search-bar input { width: 100%; background: none; border: none; color: #fff; padding: 5px; outline: none; }
        
        .hero { position: relative; height: 300px; background: url('https://images.unsplash.com/photo-1545291026-86e99c73814d?w=800') center/cover; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .hero-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); }
        .hero-text { position: relative; z-index: 2; text-align: center; color: #D4AF37; border: 1px solid #D4AF37; padding: 20px; background: rgba(0,0,0,0.6); }

        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .product-card { border: 1px solid #333; text-align: center; padding-bottom: 10px; background: #0a0a0a; }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid #D4AF37; }
        .product-card h3 { font-size: 14px; margin: 10px 0; color: #D4AF37; }
        .price { font-weight: bold; }

        /* Менюто */
        .sidebar { position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: #111; transition: 0.3s; z-index: 200; border-right: 1px solid #D4AF37; padding-top: 50px; }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px; color: #D4AF37; text-decoration: none; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-container">
            <button class="burger-btn" onclick="toggleMenu()">☰</button>
            <div class="logo">Zoryna Fashion</div>
            <div style="font-size: 20px;">👤 🛍️</div>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Търси в Zoryna...">
            <button style="background:none; border:none; cursor:pointer;">🔍</button>
        </div>
    </header>

    <nav class="sidebar" id="sidebar">
        <a href="#">Начало</a>
        <a href="#">Галерия с модели</a>
        <a href="#">За нас</a>
        <a href="#">Контакти</a>
    </nav>

    <div class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-text">
            <h1>ZORYNA FASHION</h1>
            <p>Колекция 2024</p>
        </div>
    </div>

    <h2 style="text-align: center; color: #D4AF37; margin-bottom: 10px;">ПРЕПОРЪЧАНИ</h2>
    
    <div class="products-grid">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1552062407-291826ab63fd?w=400" alt="Рокля">
            <h3>Елегантна Рокля</h3>
            <p class="price">289 лв.</p>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1509631179647-0177331693ae?w=400" alt="Чанта">
            <h3>Класическа Чанта</h3>
            <p class="price">449 лв.</p>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }
    </script>
</body>
</html>
